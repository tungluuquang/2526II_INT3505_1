openapi: 3.0.0
info:
  title: Library API (Simple)
  version: 0.0.0
tags:
  - name: Books
  - name: Members
  - name: Loans
paths:
  /books:
    get:
      operationId: Books_list
      description: Lấy danh sách sách
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
      tags:
        - Books
    post:
      operationId: Books_create
      description: Thêm sách mới
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
  /books/{id}:
    get:
      operationId: Books_read
      description: Lấy chi tiết sách
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Books
    delete:
      operationId: Books_delete
      description: Xóa sách
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Books
  /loans:
    post:
      operationId: Loans_create
      description: Mượn sách
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Loan'
      tags:
        - Loans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Loan'
  /members:
    get:
      operationId: Members_list
      description: Lấy danh sách thành viên
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
      tags:
        - Members
    post:
      operationId: Members_create
      description: Tạo thành viên mới
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Member'
components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - author
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
        author:
          type: string
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    Loan:
      type: object
      required:
        - id
        - bookId
        - memberId
      properties:
        id:
          type: string
        bookId:
          type: string
        memberId:
          type: string
    Member:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
servers:
  - url: http://localhost:3000/api
    description: Cổng API chính
    variables: {}
