template_str = """
openapi: 3.0.0
info:
  title: Book API V2
  version: 2.0.0
  description: API quản lý sách

servers:
  - url: http://localhost:5000
    description: Local dev server

tags:
  - name: Books
    description: API quản lý sách Swagger

paths:
  /api/v2/books:
    get:
      tags:
        - Books
      summary: Lấy danh sách sách
      operationId: getAllBooks
      parameters:
        - name: theme
          in: cookie
          required: false
          schema:
            type: string
            enum: [light, dark]
          description: UI theme
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

    post:
      tags:
        - Books
      summary: Tạo sách mới
      description: Tạo sách mới bằng tên, tác giả và năm sáng tác
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"

  /api/v2/books/{book_id}:
    get:
      tags:
        - Books
      summary: Lấy chi tiết sách
      operationId: getBookById
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"

    put:
      tags:
        - Books
      summary: Cập nhật sách
      operationId: updateBook
      parameters:
        - $ref: "#/components/parameters/BookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookUpdate"
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"

    delete:
      tags:
        - Books
      summary: Xóa sách
      operationId: deleteBook
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"

components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - author
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Hai dua tre
        author:
          type: string
          example: Thach Lam
        publishedYear:
          type: integer
          example: 1938

    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: Doraemon
        author:
          type: string
          example: Fujiko F Fujio
        publishedYear:
          type: integer
          example: 1970

    BookUpdate:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        publishedYear:
          type: integer

    BookResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Success
        data:
          $ref: "#/components/schemas/Book"
        error:
          type: string
          nullable: true

    BookListResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Success
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        error:
          type: string
          nullable: true

  parameters:
    BookId:
      name: book_id
      in: path
      required: true
      schema:
        type: integer
      description: ID của sách